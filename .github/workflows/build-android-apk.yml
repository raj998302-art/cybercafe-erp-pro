name: Build & Release Android APK

# Triggers: build on every push to main, on version tags, and manually.
on:
  push:
    branches: [main, master]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version label (e.g. 1.0.0)'
        required: false
        default: '1.0.0'

jobs:
  build-android:
    name: Build Android APK (Release)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: write   # required to create GitHub Releases
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Set up Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show Flutter & Dart versions
        run: |
          flutter --version
          dart --version
          flutter doctor -v

      - name: Scaffold missing Android files (mipmap icons, etc.)
        run: |
          # Generates default launcher icons and any missing template files
          # without overwriting our custom AndroidManifest.xml / build.gradle.
          flutter create . --platforms=android --org com.cybercafe --project-name cybercafe_erp

      - name: Create android/local.properties
        run: |
          FLUTTER_PATH=$(which flutter)
          FLUTTER_SDK=$(dirname "$FLUTTER_PATH")
          echo "flutter.sdk=$FLUTTER_SDK" > android/local.properties
          echo "flutter.buildMode=release" >> android/local.properties
          cat android/local.properties

      - name: Download Android dependencies
        working-directory: .
        run: |
          if [ -f pubspec.yaml ]; then
            flutter pub get
          else
            echo "pubspec.yaml not found at repo root"
            exit 1
          fi

      - name: Verify Android project exists
        run: |
          test -f android/app/build.gradle || (echo "Missing android/app/build.gradle" && exit 1)
          test -f android/settings.gradle || (echo "Missing android/settings.gradle" && exit 1)

      - name: Build release APK
        run: flutter build apk --release --no-tree-shake-icons

      - name: Build app bundle (AAB) — optional, for Play Store
        run: flutter build appbundle --release --no-tree-shake-icons || true

      - name: List build outputs
        run: |
          echo "=== APK files ==="
          ls -lh build/app/outputs/flutter-apk/ || true
          echo "=== AAB files ==="
          ls -lh build/app/outputs/bundle/release/ || true

      - name: Rename APK with version
        id: rename
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if [ -z "$VERSION" ]; then
            VERSION=$(grep '^version:' pubspec.yaml | head -1 | awk '{print $2}' | cut -d '+' -f 1)
          fi
          BUILD_TIME=$(date -u +"%Y%m%d-%H%M%S")
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          NAME="CyberCafeERP-${VERSION}-${SHORT_SHA}.apk"
          cp build/app/outputs/flutter-apk/app-release.apk "$NAME"
          echo "apk_name=$NAME" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "build_time=$BUILD_TIME" >> "$GITHUB_OUTPUT"
          ls -lh "$NAME"

      - name: Generate build info JSON
        env:
          APK_NAME: ${{ steps.rename.outputs.apk_name }}
          VERSION: ${{ steps.rename.outputs.version }}
          BUILD_TIME: ${{ steps.rename.outputs.build_time }}
        run: |
          cat > build-info.json <<EOF
          {
            "app": "CyberCafe ERP Pro",
            "version": "$VERSION",
            "apk_file": "$APK_NAME",
            "build_time_utc": "$BUILD_TIME",
            "commit": "${{ github.sha }}",
            "branch": "${{ github.ref_name }}",
            "built_by": "GitHub Actions"
          }
          EOF
          cat build-info.json

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: cybercafe-erp-apk
          path: |
            ${{ steps.rename.outputs.apk_name }}
            build-info.json
          retention-days: 90
          if-no-files-found: error

      - name: Create GitHub Release (on tag or manual)
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.rename.outputs.version }}-${{ steps.rename.outputs.build_time }}
          name: CyberCafe ERP Pro v${{ steps.rename.outputs.version }}
          body: |
            ## CyberCafe ERP Pro — Release v${{ steps.rename.outputs.version }}

            **Build time (UTC):** ${{ steps.rename.outputs.build_time }}
            **Commit:** ${{ github.sha }}
            **Branch:** ${{ github.ref_name }}

            ### Download
            - APK file: `${{ steps.rename.outputs.apk_name }}`
            - Install on Android device (enable "Install from unknown sources").

            ### What's inside
            - GST Billing
            - Customer & Item management
            - Tally-style accounting (vouchers + ledgers)
            - GST returns (GSTR-1 / GSTR-3B view)
            - Reports & analytics
            - Offline-first SQLite + MongoDB cloud sync
            - Windows file-system backup
          files: |
            ${{ steps.rename.outputs.apk_name }}
            build-info.json
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
