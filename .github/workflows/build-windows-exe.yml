name: Build Windows Desktop App (.msix + .exe)

on:
  push:
    branches: [main, master]
    tags: ['win-v*']
  workflow_dispatch:

jobs:
  build-windows:
    name: Build Windows .exe + .msix (Release)
    runs-on: windows-latest
    timeout-minutes: 45

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Enable Windows desktop support
        run: flutter config --enable-windows-desktop

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Generate Windows platform scaffolding
        run: |
          # Generate the standard windows/ runner if missing or incomplete.
          flutter create . --platforms=windows --org com.cybercafe --project-name cybercafe_erp

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows release (.exe)
        run: flutter build windows --release

      - name: Build .msix installer (optional, non-fatal)
        run: |
          # msix is a dev_dependency; run via dart. Non-fatal if it fails.
          dart run msix:create --version 1.0.0.0 --architecture x64 2>&1 || true
          Get-ChildItem build\windows\x64\runner\Release\*.msix -ErrorAction SilentlyContinue | Format-Table Name,Length

      - name: Package release folder (.zip)
        shell: pwsh
        run: |
          $version = (Select-String -Path pubspec.yaml -Pattern '^version:' | Select-Object -First 1).Line.Split(' ')[1].Split('+')[0]
          $shortSha = "${{ github.sha }}".Substring(0,7)
          $zipName = "CyberCafeERP-$version-$shortSha-windows.zip"
          Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath $zipName
          "zip_name=$zipName" | Out-File -FilePath $env:GITHUB_ENV -Append
          "version=$version" | Out-File -FilePath $env:GITHUB_ENV -Append
          Write-Host "Created $zipName"
          Get-ChildItem *.zip,*.msix -ErrorAction SilentlyContinue | Format-Table Name,Length

      - name: Upload Windows .zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: cybercafe-erp-windows-zip
          path: |
            ${{ env.zip_name }}
            build/windows/x64/runner/Release/*.msix
          retention-days: 90
          if-no-files-found: warn

      - name: Create GitHub Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: CyberCafe ERP Pro (Windows) ${{ github.ref_name }}
          body: |
            ## CyberCafe ERP Pro — Windows Release

            - **Version:** ${{ env.version }}
            - **Commit:** ${{ github.sha }}

            ### Downloads
            - `.zip` portable build (contains CyberCafeERP.exe + all DLLs)
            - `.msix` Windows installer (if generated)
          files: |
            ${{ env.zip_name }}
            build/windows/x64/runner/Release/*.msix
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
