name: Build Windows Desktop App

on:
  push:
    branches: [main, master]
    tags: ['win-v*']
  workflow_dispatch:

jobs:
  build-windows:
    name: Build Windows .exe (Release)
    runs-on: windows-latest
    timeout-minutes: 45

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Enable Windows desktop support
        run: flutter config --enable-windows-desktop

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows release
        run: flutter build windows --release

      - name: Package release folder
        shell: pwsh
        run: |
          $version = (Select-String -Path pubspec.yaml -Pattern '^version:' | Select-Object -First 1).Line.Split(' ')[1].Split('+')[0]
          $shortSha = "${{ github.sha }}".Substring(0,7)
          $zipName = "CyberCafeERP-$version-$shortSha-windows.zip"
          Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath $zipName
          echo "zip_name=$zipName" | Out-File -FilePath $env:GITHUB_ENV -Append
          Write-Host "Created $zipName"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: cybercafe-erp-windows
          path: ${{ env.zip_name }}
          retention-days: 90

      - name: Create GitHub Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: CyberCafe ERP Pro (Windows) ${{ github.ref_name }}
          files: ${{ env.zip_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
