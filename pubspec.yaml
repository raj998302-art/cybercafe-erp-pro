name: cybercafe_erp
description: CyberCafe ERP Pro - GST Billing + Tally Accounting + Invoice Designer for Indian Cyber Cafes.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  provider: ^6.1.2

  # Routing
  go_router: ^14.2.0

  # Local storage / SQLite
  sqflite: ^2.3.3+1
  sqflite_common_ffi: ^2.3.3
  path: ^1.9.0
  path_provider: ^2.1.4
  shared_preferences: ^2.2.3

  # Network / API
  http: ^1.2.2
  dio: ^5.5.0+1

  # PDF & Printing
  pdf: ^3.11.1
  printing: ^5.13.1

  # Excel / CSV export
  excel: ^4.0.6
  csv: ^6.0.0

  # File system
  file_picker: ^8.1.2
  open_filex: ^4.4.0

  # URL launcher (WhatsApp, email, browser)
  url_launcher: ^6.3.1

  # Utilities
  intl: ^0.19.0
  uuid: ^4.4.2
  logger: ^2.4.0
  collection: ^1.18.0
  decimal: ^3.0.2

  # Date
  table_calendar: ^3.1.2

  # UI
  fl_chart: ^0.68.0
  data_table_2: ^2.5.15
  icons_plus: ^5.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  msix: ^3.16.7

flutter:
  uses-material-design: true
  # Assets are optional — empty folders are ignored.
  # Add assets here once image files are placed in assets/.

# MSIX Windows installer configuration (Phase 13 — Windows installer)
msix_config:
  display_name: CyberCafe ERP Pro
  publisher_display_name: CyberCafe ERP
  identity_name: com.cybercafe.erp
  publisher: CN=CyberCafeERP
  msix_version: 1.0.0.0
  architecture: x64
  capabilities: internetClient, localNetworkConfiguration
  languages: en-IN, hi-IN
  install_certificate: false
